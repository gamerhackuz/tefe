<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Effekti</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; width: 100%; max-width: 600px; }
        h2 { color: #58a6ff; margin-bottom: 15px; text-align: center; }
        textarea { width: 100%; height: 80px; background: #0d1117; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-size: 14px; resize: none; outline: none; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        button { padding: 8px 14px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #2ea043; }
        label { font-size: 13px; color: #8b949e; }
        input[type="range"] { accent-color: #58a6ff; }
        .output { background: #0d1117; padding: 15px; border-radius: 8px; min-height: 60px; border-left: 3px solid #58a6ff; font-family: monospace; font-size: 16px; line-height: 1.6; position: relative; }
        .cursor { display: inline-block; width: 2px; height: 1.2em; background: #58a6ff; animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <h2>📜 Typing Effekti Generatori</h2>
        <textarea id="inputText" placeholder="Effekt uchun matn yozing..."></textarea>
        <div class="controls">
            <button onclick="startTyping()">▶ Boshlash</button>
            <label>Tezlik: <input type="range" id="speed" min="30" max="300" value="100"></label>
        </div>
        <div class="output"><span id="display"></span><span class="cursor"></span></div>
    </div>

    <script>
        let interval;
        const display = document.getElementById('display');
        const input = document.getElementById('inputText');
        const speedEl = document.getElementById('speed');

        function startTyping() {
            clearInterval(interval);
            const text = input.value;
            if (!text) return;
            
            display.textContent = '';
            let i = 0;
            interval = setInterval(() => {
                display.textContent += text.charAt(i);
                i++;
                if (i >= text.length) clearInterval(interval);
            }, 330 - speedEl.value); // Invert: lower slider = faster
        }

        speedEl.addEventListener('input', () => startTyping());
    </script>
</body>
</html>
